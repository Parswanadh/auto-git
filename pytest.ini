[pytest]
testpaths = tests
markers =
    unit: Zero-cost tests that never call LLM APIs (no network needed)
    integration: Tests that require live LLM/API access (costs money)
    e2e: Full end-to-end pipeline tests (slow, costs money)
    diagnostic: Health checks and debugging tools
    benchmark: Performance and reliability benchmarks

# Default: only run unit tests (zero cost)
# Use -m "integration" or -m "e2e" to run expensive tests
addopts = -m "unit" --tb=short -q --asyncio-mode=auto
